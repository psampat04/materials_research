llm:
  model: "gpt-4.1-nano"
  temperature: 0.7
  max_tokens: 3000

mcts:
  budget: 100
  initial_samples: 8
  ucb_constant: 1.41
  max_depth: 8
  max_children_per_node: 4

eval:
  data_path: "perovskite-stability/TableS1.csv"
  decision_tree_max_depth: 3
  train_split_label: 1
  cv_folds: 5

search:
  state_path: "search_runs/"
  resume: null
  mode: "llmsr"   # one of: "mcts", "llmsr", "sr_mcts"

# Settings for the sr_mcts mode (token-level MCTS with PUCT, paper 2411.04459).
# Only consulted when search.mode == "sr_mcts".
sr_mcts:
  max_len: 11          # max tokens per prefix expression
  c_puct: 1.5          # PUCT exploration constant
  seed: 42
  use_llm_prior: true  # if false, run with uniform prior (no API calls)
